<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

{% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}
    <style>
      /* ── Two-column GitBook-style layout ── */
      * { box-sizing: border-box; }

      body { margin: 0; }

      .book-layout {
        display: flex;
        min-height: 100vh;
      }

      /* ── Sidebar ── */
      .book-sidebar {
        width: 260px;
        min-width: 260px;
        background: #f6f8fa;
        border-right: 1px solid #e1e4e8;
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        overflow-y: auto;
        z-index: 100;
        transition: transform 0.2s ease;
      }

      .book-sidebar-header {
        padding: 20px 16px 12px;
        border-bottom: 1px solid #e1e4e8;
        flex-shrink: 0;
      }

      .book-sidebar-header a {
        font-weight: 600;
        font-size: 15px;
        color: #24292e;
        text-decoration: none;
      }

      .book-sidebar-header a:hover { color: #0366d6; }

      /* Search inside sidebar */
      .sidebar-search {
        padding: 12px 16px;
        border-bottom: 1px solid #e1e4e8;
        position: relative;
        flex-shrink: 0;
      }

      .sidebar-search input {
        width: 100%;
        padding: 6px 10px;
        border: 1px solid #d1d5da;
        border-radius: 6px;
        font-size: 13px;
        background: #fff;
      }

      .sidebar-search input:focus {
        outline: none;
        border-color: #0366d6;
        box-shadow: 0 0 0 3px rgba(3, 102, 214, 0.1);
      }

      #search-results {
        position: absolute;
        top: 100%;
        left: 8px;
        right: 8px;
        background: white;
        border: 1px solid #d1d5da;
        border-radius: 6px;
        box-shadow: 0 8px 24px rgba(140, 149, 159, 0.2);
        z-index: 1000;
        max-height: 360px;
        overflow-y: auto;
        padding: 12px;
      }

      .search-result-item:last-child { border-bottom: none !important; }
      .search-result-item h5 { margin: 0 0 4px 0; font-size: 13px; }
      .search-result-item p  { margin: 0 0 4px 0; font-size: 12px; }

      /* Nav links */
      .book-nav {
        padding: 8px 0;
        flex: 1;
      }

      .book-nav ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .book-nav li a {
        display: block;
        padding: 6px 20px;
        font-size: 14px;
        color: #586069;
        text-decoration: none;
        border-left: 3px solid transparent;
        transition: background 0.1s, color 0.1s;
      }

      .book-nav li a:hover {
        background: #eaecef;
        color: #24292e;
      }

      .book-nav li a.active {
        color: #0366d6;
        border-left-color: #0366d6;
        background: #f1f8ff;
        font-weight: 600;
      }

      /* ── Main content ── */
      .book-content {
        margin-left: 260px;
        flex: 1;
        min-width: 0;
      }

      .book-content-inner {
        max-width: 860px;
        padding: 40px 48px;
      }

      /* ── Mobile toggle ── */
      .sidebar-toggle {
        display: none;
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 200;
        background: #fff;
        border: 1px solid #d1d5da;
        border-radius: 6px;
        padding: 6px 10px;
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
      }

      @media (max-width: 768px) {
        .sidebar-toggle { display: block; }

        .book-sidebar {
          transform: translateX(-100%);
        }

        .book-sidebar.is-open {
          transform: translateX(0);
          box-shadow: 4px 0 16px rgba(0,0,0,0.12);
        }

        .book-content {
          margin-left: 0;
        }

        .book-content-inner {
          padding: 56px 20px 32px;
        }
      }

      @media (max-width: 480px) {
        .book-content-inner { padding: 56px 16px 24px; }
      }
    </style>
  </head>
  <body>
    <!-- Mobile menu toggle -->
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation">&#9776;</button>

    <div class="book-layout">
      <!-- ── Left sidebar ── -->
      <nav class="book-sidebar" id="book-sidebar">
        <div class="book-sidebar-header">
          <a href="{{ "/" | absolute_url }}">{{ site.title | default: "Home" }}</a>
        </div>

        <!-- Search -->
        <div class="sidebar-search">
          <input type="text" id="search-input" placeholder="Search…" aria-label="Search" />
          <div id="search-results" style="display: none;">
            <div id="search-results-list"></div>
          </div>
        </div>

        <!-- Page navigation -->
        <div class="book-nav">
          {% include sidebar-nav.html %}
        </div>
      </nav>

      <!-- ── Main content ── -->
      <main class="book-content">
        <div class="book-content-inner markdown-body">
          {{ content }}

          {% if site.github.private != true and site.github.license %}
          <div class="footer border-top border-gray-light mt-5 pt-3 text-right text-gray">
            This site is open source. {% github_edit_link "Improve this page" %}.
          </div>
          {% endif %}
        </div>
      </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/anchor-js/4.1.0/anchor.min.js" integrity="sha256-lZaRhKri35AyJSypXXs4o6OPFTbTmUoltBbDCbdzegg=" crossorigin="anonymous"></script>
    <script>anchors.add();</script>

    <!-- Lunr.js for search -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lunr.js/2.3.9/lunr.min.js" integrity="sha512-4xUl/d6D6THrAnXAwGajXkoWaeMNwEKK4iNfq5DotEbLPAfk6FSxSP3ydNxqDgCw1c/0Z1Jg6L8h2j+++9BZmg==" crossorigin="anonymous"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // Mobile sidebar toggle
        var toggle = document.getElementById('sidebar-toggle');
        var sidebar = document.getElementById('book-sidebar');
        toggle.addEventListener('click', function() {
          sidebar.classList.toggle('is-open');
        });
        // Close sidebar when a nav link is clicked on mobile
        sidebar.querySelectorAll('a').forEach(function(a) {
          a.addEventListener('click', function() {
            if (window.innerWidth <= 768) sidebar.classList.remove('is-open');
          });
        });

        // Search
        var searchInput = document.getElementById('search-input');
        var searchResults = document.getElementById('search-results');
        var searchResultsList = document.getElementById('search-results-list');
        var searchIndex, searchData;

        fetch('{{ "/assets/search.json" | relative_url }}')
          .then(function(r) { return r.json(); })
          .then(function(data) {
            searchData = data;
            searchIndex = lunr(function() {
              this.ref('id');
              this.field('title', { boost: 10 });
              this.field('content');
              this.field('excerpt');
              this.field('categories');
              this.field('tags');
              data.forEach(function(doc, idx) {
                doc.id = idx;
                this.add(doc);
              }, this);
            });
          })
          .catch(function(e) { console.error('Search load error:', e); });

        searchInput.addEventListener('input', function() {
          var query = this.value.trim();
          if (query.length < 2) { searchResults.style.display = 'none'; return; }
          if (!searchIndex) {
            searchResultsList.innerHTML = '<p>Loading…</p>';
            searchResults.style.display = 'block';
            return;
          }
          try {
            displaySearchResults(searchIndex.search(query), query);
          } catch(e) {
            searchResultsList.innerHTML = '<p>Search error.</p>';
            searchResults.style.display = 'block';
          }
        });

        function displaySearchResults(results, query) {
          if (results.length === 0) {
            searchResultsList.innerHTML = '<p>No results for "' + query + '"</p>';
          } else {
            var html = '';
            results.slice(0, 8).forEach(function(result) {
              var item = searchData[result.ref];
              html += '<div class="search-result-item mb-2 pb-2 border-bottom">';
              html += '<h5><a href="' + item.url + '">' + item.title + '</a></h5>';
              if (item.excerpt) html += '<p class="text-gray">' + item.excerpt + '</p>';
              html += '</div>';
            });
            searchResultsList.innerHTML = html;
          }
          searchResults.style.display = 'block';
        }

        document.addEventListener('click', function(e) {
          if (!searchResults.contains(e.target) && e.target !== searchInput) {
            searchResults.style.display = 'none';
          }
        });
      });
    </script>
  </body>
</html>
